<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — StudioPoint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .checkmark {
      width: 72px; height: 72px;
      background: #7C3AED;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      font-size: 36px;
    }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 16px; }
    p { font-size: 1.1rem; color: #aaa; max-width: 480px; line-height: 1.6; margin-bottom: 12px; }
    .back-btn {
      display: inline-block;
      margin-top: 32px;
      background: #7C3AED;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
    }
    .back-btn:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="checkmark">✓</div>
  <h1>You're on the list!</h1>
  <p>Thanks for reaching out. We'll be in touch within 1 business day to schedule your free demo.</p>
  <p style="color:#666;font-size:0.95rem;">In the meantime, feel free to explore the site.</p>
  <a href="/" class="back-btn">← Back to StudioPoint</a>
</body>
</html>
